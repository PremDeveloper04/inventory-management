name: 🚀 Deploy Laravel (Production)

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: 🚀 Deploy via SSH
    uses: appleboy/ssh-action@v1.0.0
    with:
      host: ${{ secrets.SERVER_HOST }}
      username: ${{ secrets.SERVER_USER }}
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      script: |
        set -e

        echo "🚀 Starting Deployment..."

        cd /var/www/inventory-management

        echo "📥 Pull latest code"
        git pull origin main

        echo "📦 Install PHP dependencies"
        composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

        echo "📦 Install Node dependencies"
        npm ci

        echo "🏗️ Build frontend (Vite)"
        npm run build

        echo "🧪 Run database migrations"
        php artisan migrate --force

        echo "⚡ Clear old cache"
        php artisan config:clear
        php artisan cache:clear
        php artisan route:clear
        php artisan view:clear

        echo "⚡ Cache for production"
        php artisan config:cache
        php artisan route:cache
        php artisan view:cache

        echo "🔁 Restart queue (if running)"
        php artisan queue:restart || true

        echo "🔒 Fix permissions"
        chown -R www-data:www-data /var/www/inventory-management

        echo "✅ Deployment Finished"
```
